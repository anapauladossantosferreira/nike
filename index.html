<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Brasil - Loja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Arial, sans-serif; }
        header { padding: 15px 40px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; gap: 20px; }
        .nav a { text-decoration: none; color: black; font-weight: bold; font-size: 14px; }
        
        .container { padding: 20px 40px; }
        .section-title { font-size: 22px; font-weight: bold; margin: 30px 0 20px; text-transform: uppercase; border-left: 5px solid black; padding-left: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #fff; transition: 0.3s; cursor: pointer; }
        .card:hover { opacity: 0.8; }
        .card img { width: 100%; height: 300px; object-fit: cover; background: #f6f6f6; border-radius: 4px; }
        .info { padding: 10px 0; }
        .name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .type { color: #757575; font-size: 14px; }
        .price { font-weight: bold; margin-top: 8px; font-size: 17px; }
    </style>
</head>
<body>

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" width="60">
    <div class="nav">
        <a href="#">MASCULINO</a>
        <a href="#">FEMININO</a>
        <a href="#">KIDS</a>
        <a href="#">OFERTAS</a>
    </div>
</header>

<div class="container">
    
    <h2 class="section-title">Calçados</h2>
    <div class="grid">
        <div class="card">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/17688724869441018328_0" alt="Sapatilhas Nike">
            <div class="info">
                <div class="name">Nike Air Force 1 '07</div>
                <div class="type">Lifestyle</div>
                <div class="price">R$ 799,99</div>
            </div>
        </div>
        <div class="card">
            <img src="https://imgnike-a.akamaihd.net/750x750/0219805A.jpg" alt="Nike Dunk">
            <div class="info">
                <div class="name">Nike Dunk Low Retro</div>
                <div class="type">Skateboarding</div>
                <div class="price">R$ 899,99</div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Vestuário</h2>
    <div class="grid">
        <div class="card">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/8162158475232768930_0" alt="Camisa Nike">
            <div class="info">
                <div class="name">Camisa Nike Dri-FIT</div>
                <div class="type">Treino / Futebol</div>
                <div class="price">R$ 199,99</div>
            </div>
        </div>
    </div>

    <h2 class="section-title">Equipamentos</h2>
    <div class="grid">
        <div class="card">
            <img src="http://googleusercontent.com/image_collection/image_retrieval/11349585363617492469_0" alt="Bola Futsal">
            <div class="info">
                <div class="name">Bola de Futsal Nike Maestro</div>
                <div class="type">Futsal</div>
                <div class="price">R$ 159,99</div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
