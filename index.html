<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nike</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        body { background-color: #fff; display: flex; flex-direction: column; align-items: center; }
        .top-bar { width: 100%; background: #f5f5f5; height: 36px; display: flex; justify-content: flex-end; padding: 0 48px; align-items: center; }
        .top-bar img { height: 18px; opacity: 0.6; }
        .login-box { width: 100%; max-width: 460px; padding: 40px 20px; text-align: center; margin-top: 20px; }
        .logo-nike { width: 60px; margin-bottom: 25px; }
        h2 { font-size: 26px; font-weight: 900; line-height: 1.2; margin-bottom: 30px; letter-spacing: -0.5px; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 16px; }
        .terms { font-size: 12px; color: #8d8d8d; margin: 15px 0; line-height: 1.5; }
        .btn-login { width: 100%; padding: 16px; background: #000; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-login:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="top-bar"><img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Jordan_logo.svg" alt="Jordan"></div>
    <div class="login-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" class="logo-nike">
        <h2>SUA CONTA PARA TUDO DA NIKE</h2>
        <input type="email" placeholder="Endereço de e-mail">
        <input type="password" placeholder="Senha">
        <p class="terms">Ao fazer login, você concorda com a Política de Privacidade e os Termos de Uso da Nike.</p>
        <button class="btn-login" onclick="window.location.href='loja.html'">ENTRAR</button>
    </div>
</body>
</html>
