<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nike - Produtos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        header { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .card { border: 1px solid #eee; padding: 10px; text-align: center; }
        .card img { width: 100%; height: auto; background: #f5f5f5; }
        h3 { font-size: 16px; margin: 10px 0; }
        p { font-weight: bold; color: #000; }
        .category-h { background: #000; color: #fff; padding: 10px 20px; margin: 0; }
    </style>
</head>
<body>
    <header><img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" width="40"></header>
    
    <h2 class="category-h">CALÇADOS</h2>
    <div class="grid">
        <div class="card">
            <img src="https://imgnike-a.akamaihd.net/750x750/0219805A.jpg">
            <h3>Nike Dunk Low</h3>
            <p>R$ 899,00</p>
        </div>
        <div class="card">
            <img src="https://imgnike-a.akamaihd.net/750x750/026365BP.jpg">
            <h3>Air Force 1</h3>
            <p>R$ 799,00</p>
        </div>
    </div>

    <h2 class="category-h">VESTUÁRIO</h2>
    <div class="grid">
        <div class="card">
            <img src="https://imgnike-a.akamaihd.net/750x750/02703851.jpg">
            <h3>Jaqueta Nike Sport</h3>
            <p>R$ 450,00</p>
        </div>
    </div>
</body>
</html>
